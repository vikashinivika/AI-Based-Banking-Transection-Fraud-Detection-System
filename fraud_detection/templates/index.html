<!DOCTYPE html>
<html>
<head>
    <title>AI Banking Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="text-center">AI-Based Banking Fraud Detection</h1>

<form method="POST" class="mt-4">

    <!-- Account Number -->
    <input type="text" name="account"
           placeholder="Account Number"
           class="form-control mb-2"
           required>

    <!-- Amount (TYPE panna allow aagum) -->
    <input type="text" name="amount"
           placeholder="Amount"
           class="form-control mb-2"
           inputmode="numeric"
           required>

    <!-- Time (TYPE panna allow aagum) -->
    <input type="text" name="time"
           placeholder="Time (0-23)"
           class="form-control mb-2"
           inputmode="numeric"
           required>

    <!-- Location -->
    <input type="text" name="location"
           placeholder="Location"
           class="form-control mb-2"
           required>

    <!-- Device (DROPDOWN) -->
    <select name="device" class="form-control mb-2" required>
        <option value="">Select Device</option>
        <option value="Known">Known</option>
        <option value="New">New</option>
    </select>

    <!-- Transaction Type (DROPDOWN) -->
    <select name="txn_type" class="form-control mb-2" required>
        <option value="">Select Transaction Type</option>
        <option value="Debit">Debit</option>
        <option value="Transfer">Transfer</option>
    </select>

    <!-- Previous Fraud Count -->
    <input type="number" name="prev_fraud"
           placeholder="Previous Fraud Count"
           class="form-control mb-2"
           required>

    <button type="submit" class="btn btn-primary w-100">
        Check Transaction
    </button>

</form>

{% if result %}
<h2 class="mt-4">Result: {{ result }}</h2>
{% endif %}

{% if show_charts %}
<h3 class="mt-3">Visualizations</h3>
<img src="{{ url_for('static', filename='bar_chart.png') }}" width="400"><br><br>
<img src="{{ url_for('static', filename='line_chart.png') }}" width="400"><br><br>
<img src="{{ url_for('static', filename='pie_chart.png') }}" width="400">
{% endif %}

</body>
</html>
